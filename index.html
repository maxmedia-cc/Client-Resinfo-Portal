<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Onboarding | MaxMedia Creatives</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900 min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200">
        
        <div class="bg-gray-900 text-white p-10 text-center relative overflow-hidden">
            <h1 class="text-4xl font-black tracking-tighter text-white mb-2">MAXMEDIA <span class="text-emerald-400">CREATIVES</span></h1>
            <p class="text-gray-400 font-semibold tracking-widest text-sm uppercase">POS Software Setup Portal</p>
        </div>

        <form action="https://formsubmit.co/cc.maxmedia@gmail.com" method="POST" enctype="multipart/form-data" class="p-10 md:p-14">
            
            <input type="hidden" name="_subject" value="New POS Setup Request - MaxMedia Client">
            
            <p class="mb-10 text-gray-600 text-lg border-l-4 border-emerald-500 pl-4 bg-gray-50 py-3 rounded-r-lg">
                Welcome to the MaxMedia setup portal. Please fill out your business details and attach your menu below to initiate your custom POS build.
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="md:col-span-2"><h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-100 pb-2">1. Point of Contact</h3></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-2">Your Full Name *</label><input type="text" name="Client_Name" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-2">Your Email *</label><input type="email" name="Client_Email" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                
                <div class="md:col-span-2 mt-4"><h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-100 pb-2">2. Restaurant Information</h3></div>
                <div class="md:col-span-2"><label class="block text-sm font-bold text-gray-700 mb-2">Restaurant Name *</label><input type="text" name="Restaurant_Name" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                <div class="md:col-span-2"><label class="block text-sm font-bold text-gray-700 mb-2">Full Address *</label><input type="text" name="Address" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-2">Contact Number *</label><input type="tel" name="Phone_Number" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-2">Standard GST %</label><input type="number" name="GST_Percentage" placeholder="e.g. 5" class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>

                <div class="md:col-span-2 mt-4"><h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-100 pb-2">3. Operations & Setup</h3></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-2">Total Number of Tables *</label><input type="number" name="Total_Tables" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-2">Desired Admin Password *</label><input type="text" name="Admin_Password" required class="w-full p-3 rounded bg-gray-50 border border-gray-300 focus:border-emerald-500 outline-none"></div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Required Features</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2"><input type="checkbox" name="Features" value="Dine-In" class="w-5 h-5"> Dine-In</label>
                        <label class="flex items-center gap-2"><input type="checkbox" name="Features" value="Parcel" class="w-5 h-5"> Parcel/Takeaway</label>
                        <label class="flex items-center gap-2"><input type="checkbox" name="Features" value="Delivery" class="w-5 h-5"> Swiggy/Zomato</label>
                        <label class="flex items-center gap-2"><input type="checkbox" name="Features" value="KOT" class="w-5 h-5"> Kitchen Printers</label>
                    </div>
                </div>

                <div class="md:col-span-2 mt-4"><h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-100 pb-2">4. Upload Your Menu</h3></div>
                <div class="md:col-span-2 mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Attach Menu File (PDF, JPG, PNG) *</label>
                    <div class="w-full p-8 border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 text-center hover:bg-gray-100 transition">
                        <input type="file" name="attachment" accept="image/png, image/jpeg, application/pdf" required class="w-full text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-emerald-50 file:text-emerald-700 cursor-pointer">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-5 rounded-xl shadow-lg transition text-lg tracking-wide uppercase">
                Submit Setup Request
            </button>
        </form>
    </div>

</body>
</html>
